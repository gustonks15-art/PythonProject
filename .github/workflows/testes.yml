name: Testes Unitarios Bancario

[cite_start]on: [push] # O teste roda a cada novo push no repositório [cite: 21]

jobs:
  executar-testes:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        
    - name: Rodar Testes Unitarios
      run: |
        python -m unittest discover -p "testes_*.py"
